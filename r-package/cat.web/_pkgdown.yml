url: https://christophersoria.com/cat-llm/cat.web/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#00a89a"
    code_font: {google: "DM Mono"}

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/chrissoria/cat-llm
      aria-label: GitHub repository

home:
  title: cat.web — Web content classification for R
  description: >
    R interface to the Python catweb package. Domain wrapper around
    cat.stack that adds automatic URL fetching and web-context prompt
    injection (source domain, content type, page metadata).
  links:
  - text: CatLLM ecosystem index
    href: ../

reference:
- title: Classify & extract web content
  contents:
  - classify
  - extract
  - explore
- title: Summarize web content
  contents:
  - summarize

authors:
  Chris Soria:
    href: https://christophersoria.com
