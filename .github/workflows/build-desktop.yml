name: Build desktop bundle

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      upload-to-hf:
        description: "Upload built DMG to HuggingFace?"
        type: boolean
        default: false

permissions:
  contents: write   # so the workflow can attach DMGs to GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (M1)
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          brew install create-dmg
          pip install --upgrade pip

      - name: Build .app + .dmg
        run: bash app/desktop/build.sh

      - name: Locate artifacts
        id: artifacts
        run: |
          DMG_PATH=$(ls app/desktop/dist/CatLLM-*.dmg | head -1)
          DMG_NAME=$(basename "$DMG_PATH")
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.dmg_name }}
          path: |
            ${{ steps.artifacts.outputs.dmg_path }}
            ${{ steps.artifacts.outputs.dmg_path }}.sha256

      # Tag-triggered runs also publish to a GitHub Release.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.dmg_path }}
            ${{ steps.artifacts.outputs.dmg_path }}.sha256
          generate_release_notes: true

      # Optional: push to HuggingFace Hub. Requires HF_TOKEN repo secret.
      - name: Upload to HuggingFace
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.upload-to-hf == true)
          || startsWith(github.ref, 'refs/tags/v')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skipping HuggingFace upload."
            exit 0
          fi
          pip install --quiet huggingface_hub
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "chrissoria/catllm-desktop"
          for fn in os.listdir("app/desktop/dist"):
              if fn.startswith("CatLLM-") and (fn.endswith(".dmg") or fn.endswith(".sha256")):
                  api.upload_file(
                      path_or_fileobj=f"app/desktop/dist/{fn}",
                      path_in_repo=fn,
                      repo_id=repo_id,
                      repo_type="model",
                  )
                  print(f"uploaded {fn}")
          PY
